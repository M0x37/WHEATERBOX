<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wetterstation ESP32-S3</title>
    <style>
        html { font-family: sans-serif; display: inline-block; margin: 0px auto; text-align: center; }
        /* Dark Mode Basisfarben */
        body { margin-top: 50px; background-color: #121212; color: #e0e0e0; }
        /* Überschriftenfarben angepasst für Dark Mode */
        h1 { color: #3399ff; }
        h2 { color: #aaaaaa; }
        .data-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        /* Dunkle Karten */
        .data-card { background: #1e1e1e; border: 1px solid #333333; border-radius: 8px; padding: 20px; width: 80%; max-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        /* Überschriften innerhalb der Karten */
        .data-card h3 { color: #ffffff; margin-top: 0; }
        /* Hauptwerte in weiß */
        .value { font-size: 2em; font-weight: bold; color: #ffffff; }
        /* Einheiten in gedimmtem grau */
        .unit { font-size: 1.2em; color: #aaaaaa; }
    </style>
</head>
<body>
    <h1>Aktuelle Wetterdaten</h1>
    <h2>ESP32-S3 Wetterstation</h2>
    
    <div class="data-container">

        <div class="data-card">
            <h3>Temperatur</h3>
            <span class="value">23.5</span><span class="unit">°C</span>
        </div>

        <div class="data-card">
            <h3>Luftfeuchtigkeit</h3>
            <span class="value">48</span><span class="unit">% rF</span>
        </div>

        <div class="data-card">
            <h3>Luftdruck</h3>
            <span class="value">1012.4</span><span class="unit">hPa</span>
        </div>

    </div>
</body>
</html>
